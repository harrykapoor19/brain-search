<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brain-search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Fraunces:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #F7F5F0;
    --white:      #FFFFFF;
    --amber:      #C9A962;
    --amber-light:#F5EDD6;
    --amber-dark: #9A7B38;
    --divider:    #EDEAE4;
    --card-border:#E5E1D9;
    --text:       #1A1A1A;
    --text-2:     #6B6B6B;
    --text-3:     #A0A0A0;
    --radius:     12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,245,240,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--divider);
    padding: 0 40px; display: flex; align-items: center;
    justify-content: space-between; height: 56px;
  }
  .nav-brand { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.01em; }
  .nav-brand span { color: var(--amber-dark); font-style: italic; }
  .nav-meta { font-size: 12px; color: var(--text-3); }

  /* HERO */
  .hero { max-width: 720px; margin: 0 auto; padding: 56px 40px 32px; text-align: center; }
  .hero h1 { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 12px; }
  .hero h1 em { color: var(--amber-dark); font-style: italic; }
  .hero p { font-size: 15px; color: var(--text-2); max-width: 400px; margin: 0 auto; }

  /* SEARCH */
  .search-wrap { max-width: 720px; margin: 0 auto; padding: 0 40px 20px; }
  .search-box { position: relative; }
  .search-box input {
    width: 100%; padding: 14px 20px 14px 48px;
    font-size: 16px; font-family: 'DM Sans', sans-serif;
    border: 1.5px solid var(--card-border); border-radius: 40px;
    background: var(--white); color: var(--text); outline: none;
    transition: border 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .search-box input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }
  .search-box input::placeholder { color: var(--text-3); }
  .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 16px; pointer-events: none; }
  .status { font-size: 12px; color: var(--text-3); margin-top: 10px; min-height: 18px; text-align: center; }

  /* SUGGESTIONS */
  .suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 40px 24px; max-width: 720px; margin: 0 auto; }
  .sug {
    font-size: 12px; font-weight: 500;
    background: var(--white); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 5px 14px; cursor: pointer; color: var(--text-2);
    transition: all 0.15s;
  }
  .sug:hover { background: var(--amber-light); border-color: var(--amber); color: var(--amber-dark); }

  /* FILTERS */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 40px 16px; max-width: 900px; margin: 0 auto; }
  .filter-btn {
    font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--divider); background: var(--white); color: var(--text-2);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .filter-btn:hover { border-color: var(--amber); color: var(--text); }
  .filter-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; font-weight: 600; }

  /* RESULTS */
  .results { max-width: 900px; margin: 0 auto; padding: 0 40px 80px; display: grid; gap: 12px; }

  .card {
    background: var(--white); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 20px 24px;
    transition: all 0.18s; cursor: default;
  }
  .card:hover { border-color: var(--amber); box-shadow: 0 4px 20px rgba(201,169,98,0.12); transform: translateY(-1px); }

  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

  .type-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 9px; border-radius: 6px; }
  .type-argument  { background: #EEF2FF; color: #3730A3; }
  .type-thesis    { background: var(--amber-light); color: var(--amber-dark); }
  .type-insight   { background: #F0FDF4; color: #166534; }
  .type-evidence  { background: #FFF7ED; color: #9A3412; }
  .type-finding   { background: #FDF4FF; color: #6B21A8; }
  .type-fact      { background: #F0F9FF; color: #0C4A6E; }
  .type-framework { background: #FFF1F2; color: #9F1239; }
  .type-definition{ background: #F0FDF4; color: #166534; }
  .type-prediction{ background: #FFFBEB; color: #92400E; }
  .type-counterargument { background: #FEF2F2; color: #991B1B; }
  .type-example   { background: #F8FAFC; color: #475569; }

  .card-title { font-size: 16px; font-weight: 600; flex: 1; color: var(--text); line-height: 1.3; }
  .score { font-size: 13px; font-weight: 700; color: var(--amber-dark); background: var(--amber-light); padding: 2px 8px; border-radius: 6px; white-space: nowrap; }

  .card-summary { font-size: 14px; color: var(--text-2); line-height: 1.65; margin-bottom: 12px; }

  .card-footer { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .tag { font-size: 11px; background: var(--bg); color: var(--text-3); border: 1px solid var(--divider); padding: 2px 8px; border-radius: 4px; }
  .source { font-size: 11px; color: var(--text-3); margin-left: auto; font-style: italic; }

  /* EMPTY / LOADING */
  .empty { padding: 60px 0; text-align: center; color: var(--text-3); }
  .empty strong { display: block; font-family: 'Fraunces', serif; font-size: 22px; color: var(--text-2); margin-bottom: 8px; }
  .empty code { background: var(--white); border: 1px solid var(--card-border); padding: 4px 10px; border-radius: 6px; font-size: 13px; color: var(--amber-dark); }

  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--divider); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="#">brain<span>-search</span></a>
  <span class="nav-meta" id="count">Loading…</span>
</nav>

<div class="hero">
  <h1>Search your <em>knowledge</em></h1>
  <p>Natural language — finds meaning, not just keywords</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="q" placeholder="Ask anything across your documents…" autocomplete="off" autofocus>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="suggestions" id="suggestions"></div>
<div class="filters" id="filters"></div>
<div class="results" id="results">
  <div class="empty">
    <strong>Ready to search</strong>
    Type a question above to find relevant ideas across your corpus
  </div>
</div>

<script>
let _cache = null, _timer = null, _activeFilter = null;

async function loadEmbeddings() {
  if (_cache) return _cache;
  const r = await fetch('/embeddings.json');
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.status})); throw new Error(e.error||r.status); }
  _cache = await r.json();

  const n = _cache.length;
  const sources = [...new Set(_cache.map(e => e.source_file).filter(Boolean))];
  document.getElementById('count').textContent =
    `${n} unit${n!==1?'s':''} · ${sources.length > 1 ? sources.length+' docs' : sources[0]||''}`;

  // Type filters
  const types = [...new Set(_cache.map(e => e.type).filter(Boolean))];
  if (types.length > 1) {
    const bar = document.getElementById('filters');
    bar.innerHTML = ['all',...types].map(t =>
      `<button class="filter-btn${t==='all'?' active':''}" onclick="setFilter('${t}',this)">${t}</button>`
    ).join('');
  }

  // Suggestions from top tags
  const tc = {};
  _cache.forEach(e => (e.tags||[]).forEach(t => tc[t]=(tc[t]||0)+1));
  const top = Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([t])=>t);
  if (top.length) {
    document.getElementById('suggestions').innerHTML =
      top.map(t => `<span class="sug" onclick="setQ(this)">${t}</span>`).join('');
  }
  return _cache;
}

function setFilter(type, el) {
  _activeFilter = type === 'all' ? null : type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const q = document.getElementById('q').value;
  if (q.length >= 2) runSearch(q);
}

function cosine(a, b) {
  let dot=0, na=0, nb=0;
  for (let i=0; i<a.length; i++) { dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot / (Math.sqrt(na)*Math.sqrt(nb)||1);
}

function setQ(el) {
  document.getElementById('q').value = el.textContent;
  runSearch(el.textContent);
}

function renderCard(e) {
  const pct = Math.round((e._sim||0)*100);
  const type = (e.type||'insight').toLowerCase().replace(/\s+/g,'-');
  const tags = (e.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
  const source = e.source_file ? `<span class="source">${e.source_file}</span>` : '';
  return `
    <div class="card">
      <div class="card-top">
        <span class="type-badge type-${type}">${e.type||'insight'}</span>
        <span class="card-title">${e.title||'Untitled'}</span>
        <span class="score">${pct}%</span>
      </div>
      <div class="card-summary">${e.summary||''}</div>
      <div class="card-footer">${tags}${source}</div>
    </div>`;
}

async function runSearch(q) {
  q = (q||'').trim();
  const el = document.getElementById('results');
  const st = document.getElementById('status');
  if (q.length < 2) {
    el.innerHTML = '<div class="empty"><strong>Ready to search</strong>Type a question above to find relevant ideas</div>';
    st.innerHTML = ''; return;
  }
  st.innerHTML = '<span class="spinner"></span>Searching…';
  try {
    const [embResp, embs] = await Promise.all([
      fetch('/embed', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:q})}),
      loadEmbeddings(),
    ]);
    if (!embResp.ok) { const e=await embResp.json(); throw new Error(e.error||embResp.status); }
    const {vector: qv} = await embResp.json();

    let pool = _activeFilter ? embs.filter(e=>e.type===_activeFilter) : embs;
    const scored = pool
      .map(e => ({...e, _sim: cosine(qv, e.vector)}))
      .sort((a,b) => b._sim - a._sim)
      .slice(0, 12);

    const filterNote = _activeFilter ? ` · <em>${_activeFilter}</em>` : '';
    st.innerHTML = `${scored.length} results for "<strong>${q}</strong>"${filterNote}`;
    el.innerHTML = scored.map(renderCard).join('');
  } catch(err) {
    st.innerHTML = '';
    el.innerHTML = `<div class="empty"><strong>Search failed</strong>${err.message}</div>`;
  }
}

const input = document.getElementById('q');
input.addEventListener('input', e => { clearTimeout(_timer); _timer = setTimeout(()=>runSearch(e.target.value), 350); });
input.addEventListener('keydown', e => { if(e.key==='Enter'){clearTimeout(_timer);runSearch(e.target.value);} });

loadEmbeddings().catch(err => {
  document.getElementById('count').textContent = 'No embeddings';
  document.getElementById('results').innerHTML =
    `<div class="empty"><strong>No embeddings found</strong>Run: <code>python3 scripts/ingest.py &lt;folder&gt; --run</code> then <code>python3 scripts/embed.py</code></div>`;
});
</script>
</body>
</html>
